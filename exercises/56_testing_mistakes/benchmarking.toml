[exercise]
name = "benchmarking"
category = "56_testing_mistakes"
difficulty = 3
estimated_time = "15m"

[description]
title = "Writing Accurate Benchmarks"
summary = "Fix common benchmarking mistakes that produce misleading results"
learning_objectives = [
  "Prevent compiler optimizations from skipping benchmarked code",
  "Use b.ResetTimer to exclude setup time from measurements",
  "Avoid observer effects by keeping setup outside the benchmark loop",
  "Write sub-benchmarks that correctly isolate the code being measured",
]

[validation]
mode = "test"
timeout = "30s"

[hints]
level_1 = """The compiler can see that a benchmark result is never used and
optimize the function call away entirely, making it appear instant.
Fix: store the result in a package-level variable so the compiler can't prove
it's unused. Declare 'var benchResult []int' at package level, then inside
the loop: r = SortSlice(input), and after the loop: benchResult = r."""
level_2 = """b.ResetTimer() tells the benchmark timer to start fresh.
Without it, expensive setup (like GenerateSlice creating 10,000 elements)
is counted in the measurement, inflating your ns/op numbers.
Add b.ResetTimer() right after setup, before the b.N loop."""
level_3 = """The observer effect: if you create input INSIDE the b.N loop,
you're benchmarking input creation + the function together. Each iteration
measures both, so you can't tell how fast the function alone is.
Fix: create input once BEFORE b.ResetTimer() and the loop:
parts := make([]string, size)
for j := range parts { parts[j] = "x" }
b.ResetTimer()
for i := 0; i < b.N; i++ { BuildString(parts) }
Now each iteration only measures BuildString."""

[metadata]
tags = ["testing", "benchmarks", "performance", "compiler-optimization", "100-go-mistakes"]
