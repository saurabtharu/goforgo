[exercise]
name = "hello"
category = "01_basics"
order = 1
difficulty = 1
estimated_time = "2m"

[description]
title = "Hello GoForGo"
summary = "Your first Go program with GoForGo. Edit this file in the exercises/ folder — the solutions/ folder has the answers for reference. Fix the code, save, and GoForGo will check your work automatically."
learning_objectives = [
  "Understand basic Go program structure",
  "Learn about the main function",
  "Practice string literals"
]

[validation]
mode = "run"
expected_output = "Hello, GoForGo!"
timeout = "10s"

[hints]
level_1 = "Open exercises/01_basics/hello.go in your editor (not the solutions/ folder — that has the answer). Look for the TODO comment."
level_2 = "Find the fmt.Println() call and change the string inside the quotes."
level_3 = "Replace 'Hello, World!' with 'Hello, GoForGo!' and save the file."