[exercise]
name = "comments"
category = "01_basics"
order = 7
difficulty = 1
estimated_time = "4m"

[description]
title = "Comments in Go"
summary = "Learn how to write comments in Go"
learning_objectives = [
  "Understand single-line comments with //",
  "Learn about multi-line comments with /* */",
  "Practice documenting code"
]

[validation]
mode = "static"
static_check = "has_line_comment"

[hints]
level_1 = "Open comments.go — there are two TODO markers showing where to add comments."
level_2 = "After the first TODO (line 6), add a /* ... */ block. After the second TODO (line 10), add a // comment."
level_3 = "Add a multi-line comment like /* This program demonstrates comments in Go */ and a single-line comment like // Print a message about readability"