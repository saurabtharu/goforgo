[exercise]
name = "print_functions"
category = "01_basics"
order = 4
difficulty = 2
estimated_time = "5m"

[description]
title = "Printf vs Println"
summary = "Learn the different print functions in the fmt package. Open the exercise file and add code where the TODO comment says 'Your code here'."
learning_objectives = [
  "Understand fmt.Printf for formatted output",
  "Learn about format specifiers (%s, %d)",
  "Compare Printf with Println"
]

[validation]
mode = "run"
expected_output = "Hello, my name is Gopher and I am 5 years old."
timeout = "10s"

[hints]
level_1 = "Open print_functions.go and find the TODO comment. You need to ADD a line of code where it says 'Your code here'."
level_2 = "Use fmt.Printf with %s for the name variable and %d for the age variable. Don't forget \\n at the end for a newline."
level_3 = "Replace the '// Your code here' comment with: fmt.Printf(\"Hello, my name is %s and I am %d years old.\\n\", name, age)"