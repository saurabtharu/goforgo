[exercise]
name = "trim_concat"
order = 2
category = "50_strings"
difficulty = 3
estimated_time = "15m"

[description]
title = "Trim Confusion and Efficient Concatenation"
summary = "Fix TrimRight/TrimSuffix confusion and optimize string building"
learning_objectives = [
  "Distinguish TrimRight (character set) from TrimSuffix (exact substring)",
  "Distinguish TrimLeft (character set) from TrimPrefix (exact substring)",
  "Use strings.Builder for efficient loop concatenation instead of +=",
  "Understand why += concatenation is O(n^2) for strings",
]

[validation]
mode = "run"
timeout = "30s"

[hints]
level_1 = """strings.TrimRight(s, cutset) removes trailing characters that \
are in the cutset — it's a set of characters, not a substring. \
strings.TrimSuffix(s, suffix) removes the exact trailing substring."""
level_2 = """For efficient concatenation, create a strings.Builder with \
var b strings.Builder, then use b.WriteString() in the loop, and \
call b.String() at the end. This avoids repeated allocation."""
level_3 = """Replace strings.TrimRight(name, \".txt\") with \
strings.TrimSuffix(name, \".txt\") and strings.TrimLeft(path, \"http://\") \
with strings.TrimPrefix(path, \"http://\"). For buildCSV, use: \
var b strings.Builder; b.WriteString(line); return b.String()."""

[metadata]
tags = ["strings", "trim", "builder", "concatenation", "performance", "100-go-mistakes"]
